services:
  postgres:
    image: postgres:17-alpine
    container_name: aaeasy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aaeasy
      POSTGRES_PASSWORD: aaeasy
      POSTGRES_DB: aaeasy
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aaeasy -d aaeasy']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
